<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store registration</title>
    <link rel="icon" href="img/icon.png">
</head>
<body>
    <img src="img/logo.png" alt="logo">
    <div class="container">
        <h1>Регистрация нового аккаунта</h1>
        <form action="registration" method="post">
            <!-- Ввод имени пользователя -->
            <label for="username">username</label>
            <input type="text" name="username">

            <!-- Ввод email пользователя -->
            <label for="email">email</label>
            <input type="email" name="email">

            <!-- Ввод пароля пользователя -->
            <label for="password">password</label>
            <input type="password" name="password">

            <!-- Подтверждение пароля -->
            <label for="password">повторите пароль</label>
            <input type="password" name="password">
            <div class="continue_container">
                <p>Есть аккаунт?<a href="login.html">Войти</a></p>
                <!-- кнопка продолжения -->
                <a href="main.html"><button type="submit">Зарегистрироваться</button></a>
            </div> 
        </form>
        <!-- Кнопка Назад -->
        <a class="button_back" href="main.html"><button>Назад</button></a>
    </div>


    <style>
        body{
            background-color: rgb(255, 255, 167);
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 1em;
        }
        button{
            background-color: lightcoral;
        }

        .container{
            display: flex;
            flex-direction: column;
            margin-left: auto;
            margin-right: auto;
            padding: 30px;
            height: 550px;
            width: 500px;
            background-color:beige;
        }

        .continue_container{
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .button_back{
            width: fit-content;
        }
    </style>
</body>
</html>
